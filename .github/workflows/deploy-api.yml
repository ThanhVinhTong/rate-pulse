name: Deploy API to production

on:
  push:
    branches: [ main ]
    paths:
      - 'rate-pulse-api/**'
      - 'digitalocean/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'rate-pulse-api/**'
      - 'digitalocean/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: vinhtongthanh57/rate-pulse-api
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & push Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest ./rate-pulse-api
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy:
    name: Deploy on Droplet
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Copy Kubernetes manifests
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          password: ${{ secrets.DROPLET_PASSWORD || secrets.PASSWORD }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "digitalocean/*"
          target: "~/rate-pulse-api"

      - name: SSH → Apply Secrets & Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          password: ${{ secrets.DROPLET_PASSWORD || secrets.PASSWORD }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/rate-pulse-api
            
            # 1. Create/Update the Kubernetes Secret
            kubectl create secret generic rate-pulse-secrets \
              --from-literal=DB_SOURCE='${{ secrets.DB_SOURCE }}' \
              --from-literal=DB_DRIVER='${{ secrets.DB_DRIVER }}' \
              --from-literal=SERVER_ADDRESS='${{ secrets.SERVER_ADDRESS }}' \
              --from-literal=ACCESS_TOKEN_DURATION='${{ secrets.ACCESS_TOKEN_DURATION }}' \
              --from-literal=TOKEN_SYMMETRIC_KEY='${{ secrets.TOKEN_SYMMETRIC_KEY }}' \
              --from-literal=REFRESH_TOKEN_DURATION='${{ secrets.REFRESH_TOKEN_DURATION }}' \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # 2. Apply deployment manifests
            kubectl apply -f digitalocean/deployment.yaml
            kubectl apply -f digitalocean/service.yaml
            kubectl apply -f digitalocean/issuer.yaml
            kubectl apply -f digitalocean/ingress.yaml
              
            # 3. Restart deployment and wait for it to be ready
            kubectl rollout restart deployment/rate-pulse-api-deployment
            kubectl rollout status deployment/rate-pulse-api-deployment --timeout=180s

            # 4. Delete configmap and app.env file
            kubectl delete configmap app-env --ignore-not-found=true
            rm -f ~/rate-pulse-api/app.env