syntax = "proto3";

package pb;

import "exchange_rate.proto";

option go_package = "github.com/ThanhVinhTong/rate-pulse/pb";

message GetLatestExchangeRatesRequest {
    int32 source_currency_id = 1;
    int32 limit = 2;
}

message GetLatestExchangeRatesResponse {
  repeated LatestExchangeRate latest_exchange_rates = 1;
}